# Complete non-trivial Airbyte low-code connector manifest example
# Demonstrates: shared definitions, parent/child streams, POST requests,
# incremental sync, composite error handling, rate limiting, transformations

version: "6.44.0"

definitions:
  # --- Shared components ---
  selector:
    type: RecordSelector
    extractor:
      type: DpathExtractor
      field_path: ["{{ parameters['data_path'] }}"]

  requester:
    type: HttpRequester
    url_base: "https://api.projectmgmt.com/v2"
    http_method: GET
    authenticator:
      type: BearerAuthenticator
      api_token: "{{ config['api_token'] }}"
    request_headers:
      Accept: "application/json"
    error_handler:
      type: CompositeErrorHandler
      error_handlers:
        - type: DefaultErrorHandler
          response_filters:
            - type: HttpResponseFilter
              http_codes: [429]
              action: RATE_LIMITED
          backoff_strategies:
            - type: WaitTimeFromHeader
              header: "Retry-After"
        - type: DefaultErrorHandler
          response_filters:
            - type: HttpResponseFilter
              http_codes: [500, 502, 503, 504]
              action: RETRY
          backoff_strategies:
            - type: ExponentialBackoffStrategy
              factor: 5
          max_retries: 5

  cursor_paginator:
    type: DefaultPaginator
    page_token_option:
      type: RequestOption
      inject_into: request_parameter
      field_name: "cursor"
    pagination_strategy:
      type: CursorPagination
      cursor_value: "{{ response['pagination']['next_cursor'] }}"
      page_size: 100
      stop_condition: "{{ response['pagination']['has_more'] is false }}"
    page_size_option:
      type: RequestOption
      inject_into: request_parameter
      field_name: "limit"

  incremental_cursor:
    type: DatetimeBasedCursor
    cursor_field: "updated_at"
    cursor_datetime_formats:
      - "%Y-%m-%dT%H:%M:%S.%fZ"
      - "%Y-%m-%dT%H:%M:%SZ"
    datetime_format: "%Y-%m-%dT%H:%M:%SZ"
    start_datetime:
      type: MinMaxDatetime
      datetime: "{{ config['start_date'] }}"
      datetime_format: "%Y-%m-%dT%H:%M:%SZ"
      min_datetime: "2020-01-01T00:00:00Z"
    end_datetime:
      type: MinMaxDatetime
      datetime: "{{ now_utc().strftime('%Y-%m-%dT%H:%M:%SZ') }}"
    step: "P30D"
    cursor_granularity: "PT1S"
    lookback_window: "P3D"
    start_time_option:
      type: RequestOption
      inject_into: request_parameter
      field_name: "updated_after"
    end_time_option:
      type: RequestOption
      inject_into: request_parameter
      field_name: "updated_before"

  # --- Stream definitions ---
  projects_stream:
    type: DeclarativeStream
    name: "projects"
    primary_key: "id"
    retriever:
      type: SimpleRetriever
      requester:
        $ref: "#/definitions/requester"
        path: "/projects"
      record_selector:
        $ref: "#/definitions/selector"
      paginator:
        $ref: "#/definitions/cursor_paginator"
    incremental_sync:
      $ref: "#/definitions/incremental_cursor"
    schema_loader:
      type: InlineSchemaLoader
      schema:
        $schema: "http://json-schema.org/draft-07/schema#"
        type: object
        properties:
          id:
            type: integer
          name:
            type: string
          status:
            type: string
          created_at:
            type: string
            format: date-time
          updated_at:
            type: string
            format: date-time
    $parameters:
      data_path: "projects"

  tasks_stream:
    type: DeclarativeStream
    name: "tasks"
    primary_key: "id"
    retriever:
      type: SimpleRetriever
      requester:
        $ref: "#/definitions/requester"
        path: "/projects/{{ stream_partition['project_id'] }}/tasks"
      record_selector:
        $ref: "#/definitions/selector"
      paginator:
        $ref: "#/definitions/cursor_paginator"
      partition_router:
        type: SubstreamPartitionRouter
        parent_stream_configs:
          - type: ParentStreamConfig
            stream:
              $ref: "#/definitions/projects_stream"
            parent_key: "id"
            partition_field: "project_id"
            incremental_dependency: true
    incremental_sync:
      $ref: "#/definitions/incremental_cursor"
    transformations:
      - type: AddFields
        fields:
          - path: ["project_id"]
            value: "{{ stream_partition['project_id'] }}"
      - type: RemoveFields
        field_pointers:
          - ["internal_notes"]
    schema_loader:
      type: InlineSchemaLoader
      schema:
        $schema: "http://json-schema.org/draft-07/schema#"
        type: object
        properties:
          id:
            type: integer
          project_id:
            type: integer
          title:
            type: string
          assignee:
            type: string
          status:
            type: string
          priority:
            type: string
          created_at:
            type: string
            format: date-time
          updated_at:
            type: string
            format: date-time
    $parameters:
      data_path: "tasks"

  comments_stream:
    type: DeclarativeStream
    name: "comments"
    primary_key: "id"
    retriever:
      type: SimpleRetriever
      requester:
        $ref: "#/definitions/requester"
        path: "/tasks/{{ stream_partition['task_id'] }}/comments"
      record_selector:
        type: RecordSelector
        extractor:
          type: DpathExtractor
          field_path: ["comments"]
        record_filter:
          type: RecordFilter
          condition: "{{ record['deleted'] != true }}"
      paginator:
        type: DefaultPaginator
        page_token_option:
          type: RequestOption
          inject_into: request_parameter
          field_name: "page"
        pagination_strategy:
          type: PageIncrement
          page_size: 50
          start_from_page: 1
        page_size_option:
          type: RequestOption
          inject_into: request_parameter
          field_name: "per_page"
      partition_router:
        type: SubstreamPartitionRouter
        parent_stream_configs:
          - type: ParentStreamConfig
            stream:
              $ref: "#/definitions/tasks_stream"
            parent_key: "id"
            partition_field: "task_id"
    transformations:
      - type: AddFields
        fields:
          - path: ["task_id"]
            value: "{{ stream_partition['task_id'] }}"
    schema_loader:
      type: InlineSchemaLoader
      schema:
        $schema: "http://json-schema.org/draft-07/schema#"
        type: object
        properties:
          id:
            type: integer
          task_id:
            type: integer
          author:
            type: string
          body:
            type: string
          deleted:
            type: boolean
          created_at:
            type: string
            format: date-time

  analytics_stream:
    type: DeclarativeStream
    name: "analytics"
    primary_key: ["project_id", "date"]
    retriever:
      type: SimpleRetriever
      requester:
        $ref: "#/definitions/requester"
        path: "/analytics"
        http_method: POST
        request_body_json:
          project_ids: "{{ config['project_ids'] }}"
          date_from: "{{ stream_interval['start_time'] }}"
          date_to: "{{ stream_interval['end_time'] }}"
          metrics:
            - "tasks_completed"
            - "tasks_created"
            - "avg_cycle_time"
      record_selector:
        type: RecordSelector
        extractor:
          type: DpathExtractor
          field_path: ["data", "metrics"]
      paginator:
        type: NoPagination
      partition_router:
        type: ListPartitionRouter
        values: "{{ config['project_ids'] }}"
        cursor_field: "project_id"
    incremental_sync:
      type: DatetimeBasedCursor
      cursor_field: "date"
      datetime_format: "%Y-%m-%d"
      cursor_datetime_formats:
        - "%Y-%m-%d"
      start_datetime:
        type: MinMaxDatetime
        datetime: "{{ config['start_date'] }}"
        datetime_format: "%Y-%m-%dT%H:%M:%SZ"
      step: "P7D"
      cursor_granularity: "P1D"
      start_time_option:
        type: RequestOption
        inject_into: body_json
        field_name: "date_from"
      end_time_option:
        type: RequestOption
        inject_into: body_json
        field_name: "date_to"
    schema_loader:
      type: InlineSchemaLoader
      schema:
        $schema: "http://json-schema.org/draft-07/schema#"
        type: object
        properties:
          project_id:
            type: integer
          date:
            type: string
            format: date
          tasks_completed:
            type: integer
          tasks_created:
            type: integer
          avg_cycle_time:
            type: number

streams:
  - $ref: "#/definitions/projects_stream"
  - $ref: "#/definitions/tasks_stream"
  - $ref: "#/definitions/comments_stream"
  - $ref: "#/definitions/analytics_stream"

check:
  type: CheckStream
  stream_names:
    - "projects"

spec:
  type: Spec
  documentation_url: "https://docs.example.com/project-mgmt-connector"
  connection_specification:
    $schema: "http://json-schema.org/draft-07/schema#"
    title: "Project Management API"
    type: object
    required:
      - "api_token"
      - "start_date"
    properties:
      api_token:
        type: string
        title: "API Token"
        description: "Bearer token for authentication"
        airbyte_secret: true
        order: 0
      start_date:
        type: string
        title: "Start Date"
        description: "UTC date for initial sync (YYYY-MM-DDTHH:MM:SSZ)"
        pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}Z$"
        pattern_descriptor: "YYYY-MM-DDTHH:MM:SSZ"
        examples:
          - "2024-01-01T00:00:00Z"
        order: 1
      project_ids:
        type: array
        title: "Project IDs"
        description: "Optional list of project IDs to sync analytics for"
        items:
          type: integer
        order: 2
