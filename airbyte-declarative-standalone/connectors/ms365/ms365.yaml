definitions:
  streams:
    email_activity:
      type: DeclarativeStream
      name: email_activity
      primary_key:
        - unique_key
      retriever:
        type: SimpleRetriever
        requester:
          $ref: "#/definitions/base_requester"
          path: >-
            /beta/reports/getEmailActivityUserDetail(date={{
            stream_interval.start_time[:10] }})
          http_method: GET
          request_parameters:
            $format: application/json
        record_selector:
          type: RecordSelector
          extractor:
            type: DpathExtractor
            field_path:
              - value
        paginator:
          type: DefaultPaginator
          page_token_option:
            type: RequestOption
            inject_into: request_parameter
            field_name: skiptoken
          pagination_strategy:
            type: CursorPagination
            cursor_value: >-
              {{ response['@odata.nextLink'].split('$skiptoken=')[1] if
              response['@odata.nextLink'] is defined else None }}
            stop_condition: "{{ response['@odata.nextLink'] is not defined }}"
        decoder:
          type: JsonDecoder
      incremental_sync:
        type: DatetimeBasedCursor
        cursor_field: reportRefreshDate
        cursor_datetime_formats:
          - "%Y-%m-%d"
        datetime_format: "%Y-%m-%d"
        start_datetime:
          type: MinMaxDatetime
          datetime: "{{ day_delta(-27, format='%Y-%m-%d') }}"
          datetime_format: "%Y-%m-%d"
        end_datetime:
          type: MinMaxDatetime
          datetime: "{{ day_delta(-3, format='%Y-%m-%d') }}"
          datetime_format: "%Y-%m-%d"
      transformations:
        - type: AddFields
          fields:
            - type: AddedFieldDefinition
              path:
                - unique_key
              value: >-
                {{ (record['userPrincipalName'] ~ '-' ~ record['reportRefreshDate']) | lower }}
      schema_loader:
        type: InlineSchemaLoader
        schema:
          $ref: "#/schemas/email_activity"
